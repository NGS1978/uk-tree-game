  .flightwrap{display:inline-block;width:86%;max-width:380px}
  .flightwrap svg{width:100%;height:auto;display:block}
  .hint{font:13px system-ui,sans-serif;color:#7d7a5e;margin-top:6px}

  .sleepy-lids{opacity:1;transition:opacity .13s ease}
  .owlwrap.awake .alert-extras{opacity:1}

<script>
  var p=document.getElementById('perched');
  function wake(){ p.classList.add('awake'); }
  function sleep(){ p.classList.remove('awake'); }
  ['pointerenter','pointerdown'].forEach(function(e){ p.addEventListener(e, wake); });
  ['pointerleave','pointerup','pointercancel'].forEach(function(e){ p.addEventListener(e, sleep); });
  // touch fallback
  p.addEventListener('touchstart', function(e){ wake(); }, {passive:true});
  p.addEventListener('touchend', sleep);
</script></body></html>
